<title>Contact Me</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    color: black;
}

/* Navbar */

nav{
    display: flex;
    justify-content: space-between;
    padding: 10px 30px;
    background: #87ab69;
    align-items: center;
}

nav h3 {
    font-family: Algerian, sans-serif;
    color: black;
}

nav a {
    color: white;
    font-family: 'Bradley Hand ITC', sans-serif;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

nav a:hover {
    color: black;
}

/* Heading */
h1 {
    text-align: center;
    margin: 30px;
}

/* Contact Layout */
.contact {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
}



/* Button */
button {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    color: black;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}


/* Contact Details */
.details {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.details h3 {
    margin-top: 0;
    align: center;
}

.details p {
    margin: 10px 0;
}

.details a {
    color: #0ea5e9;
    text-decoration: none;
}
</style>
</head>
